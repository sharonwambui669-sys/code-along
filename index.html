<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>To-Do List Application</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

     <!-- Header Section -->
  <header>

    <h1>My Daily To-Do List</h1>

    <p>
      Organize your daily activities and manage your tasks easily.
    </p>

  </header>

   <!-- Main Container -->
  <main class="container">

    <!-- Form Section -->
    <section class="form-section">

      <h2>Add New Task</h2>

      <!-- Task Form -->
      <form id="taskForm">
                <!-- Task Name -->
        <div class="input-group">

          <label for="taskName">
            Task Name
          </label>

          <input 
            type="text"
            id="taskName"
            placeholder="Enter task name"
            required
          >

        </div>

        <!-- Due Date -->
        <div class="input-group">

          <label for="taskDate">
            Due Date
          </label>

          <input 
            type="date"
            id="taskDate"
          >

        </div>

        <!-- Submit Button -->
        <button type="submit">

          Add Task

        </button>

          </form>

    </section>

    <!-- Task Display Section -->
    <section class="task-section">

      <h2>Task List</h2>


       <!-- Tasks Will Be Added Here -->
      <ul id="taskList">

      </ul>

    </section>

  </main>

   <!-- Footer -->
  <footer>

    <p>
      Created using HTML, CSS and JavaScript
    </p>

  </footer>

  <!-- Linking JavaScript File -->
  <script src="script.js"></script>

</body>
</html>
